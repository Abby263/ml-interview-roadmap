name: Content request
description: Suggest a roadmap topic, question, reference, or case study.
title: "[Content]: "
labels: ["content"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Statistics / Math
        - Traditional ML
        - Deep Learning
        - MLOps
        - Generative AI
        - LLMOps
        - ML System Design
        - DSA / Coding
        - Behavioral
        - Case Study
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: Request
      description: What should be added or corrected?
    validations:
      required: true
  - type: textarea
    id: interview_signal
    attributes:
      label: Interview signal
      description: Why is this useful for interviews?
  - type: textarea
    id: references
    attributes:
      label: References
      description: Add official docs, papers, trusted blogs, or candidate reports.
